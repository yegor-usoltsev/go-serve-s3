---
version: "2"

linters:
  default: none
  enable:
    # bugs and correctness
    - bodyclose
    - copyloopvar
    - errcheck
    - exhaustive
    - govet
    - ineffassign
    - noctx
    - staticcheck
    - unused

    # style and code quality
    - dupl
    - forbidigo
    - gochecknoinits
    - gocritic
    - misspell
    - modernize
    - nakedret
    - nestif
    - nolintlint
    - prealloc
    - revive
    - sloglint
    - testifylint
    - unconvert
    - unparam

    # error handling and security
    - errorlint
    - gosec
    - wrapcheck

  settings:
    forbidigo:
      forbid:
        - pattern: "^(print(|ln)|fmt\\.Print(|f|ln)|os\\.Exit)$"
          msg: Use structured logging, return errors, or panic instead when appropriate.
    gocritic:
      enabled-tags:
        - performance
        - style
        - experimental
      disabled-checks:
        - hugeParam
        - rangeValCopy
        - wrapperFunc
    gosec:
      excludes:
        - G120 # form data without body size limit
        - G122 # filepath.Walk/WalkDir TOCTOU
        - G703 # path traversal via taint analysis
        - G704 # SSRF via taint analysis
        - G706 # log injection via taint analysis
    misspell:
      locale: US
    sloglint:
      key-naming-case: snake
      kv-only: true
      msg-style: lowercased
      static-msg: true

  exclusions:
    paths:
      - builtin/
      - examples/
      - third_party/
      - vendor/
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - path: (.+)_test\.go
        linters:
          - dupl
          - gosec
          - noctx
          - wrapcheck

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    paths:
      - builtin/
      - examples/
      - third_party/
      - vendor/

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  uniq-by-line: false

run:
  tests: true
  timeout: 100s

severity:
  default: error
